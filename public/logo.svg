  <!-- Outer Shield Elements -->
  <path d="M50 20 L80 10 L110 20" stroke="#00AB8E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M20 50 L10 60 L30 80" stroke="#00305D" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M80 50 L110 60 L90 80" stroke="#00305D" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M50 90 L70 110 L90 80" stroke="#00305D" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Checkmark Arrow -->
